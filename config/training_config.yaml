# Training Configuration for Arabic News Assistant

model:
  base_model_id: "Qwen/Qwen2.5-1.5B-Instruct"
  max_seq_length: 2048
  dtype: "bfloat16"  # or "float16" for older GPUs
  load_in_4bit: true

lora:
  r: 16
  lora_alpha: 16
  lora_dropout: 0.05
  bias: "none"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  output_dir: "outputs/models/qwen-arabic-assistant"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  gradient_checkpointing: true
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  max_grad_norm: 0.3
  logging_steps: 10
  save_strategy: "steps"
  save_steps: 100
  evaluation_strategy: "steps"
  eval_steps: 100
  fp16: false
  bf16: true
  optim: "adamw_torch"
  lr_scheduler_type: "constant"
  group_by_length: true
  report_to: "wandb"
  seed: 42

data:
  raw_data_path: "data/raw/news-sample.jsonl"
  sft_data_path: "data/processed/sft.jsonl"
  train_test_split: 0.1
  random_seed: 42

generation:
  openrouter_model: "deepseek/deepseek-v3.1-terminus"
  temperature: 0.2
  max_tokens: 512
  timeout: 60
  target_languages:
    - "English"
    - "French"

wandb:
  project: "arabic-news-assistant"
  entity: null  # Your wandb username
  name: "qwen-1.5b-arabic"
